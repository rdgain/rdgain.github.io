<section>

<h2>Career Journey</h2>

<div class="timeline">

{% assign items = site.data.timeline | where:"featured", true %}

{% for item in items %}

<div class="timeline-item">

    <div class="timeline-year">

        {{ item.year }}

    </div>

    <div class="timeline-content">

        <h3>{{ item.title }}</h3>

        <h4>{{ item.organisation }}</h4>

        <p>

            {{ item.description }}

        </p>

        <div class="skill-list">

            {% for tech in item.technologies %}

                <span>{{ tech }}</span>

            {% endfor %}

        </div>

    </div>

</div>

{% endfor %}

</div>

</section>
