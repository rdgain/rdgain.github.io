topics:

  - id: rhea

    featured: true

    title: Rolling Horizon Evolutionary Algorithms

    short: RHEA

    years: "2016–2021"

    image: /assets/images/research/rhea.jpg

    tagline: >
      Planning algorithms capable of playing previously unseen games.

    summary: >
      My PhD focused on Rolling Horizon Evolutionary Algorithms (RHEA),
      investigating their use for General Video Game Playing and comparing
      them against Monte Carlo Tree Search. The work explored how
      evolutionary planning methods can efficiently solve unknown games
      without game-specific heuristics.

    motivation: >
      General Video Game Playing requires agents that can quickly adapt to
      completely new games. Traditional search methods perform well, but
      evolutionary approaches offer a flexible alternative capable of
      balancing exploration and exploitation.

    contributions:

      - Comprehensive study of RHEA hyperparameters.

      - Population seeding techniques.

      - Algorithm structure improvements.

      - Feature analysis of agent behaviour.

      - Convergence analysis.

      - Performance prediction during gameplay.

      - Fitness landscape analysis.

    impact:

      - PhD Thesis

      - Multiple journal publications

      - International collaborations

      - Used as foundation for later research

    technologies:

      - Evolutionary Algorithms
      - Search
      - Java
      - Optimisation

    publications:

    portfolio:
      - gvgai


