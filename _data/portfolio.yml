- id: tag

  featured: true

  title: TAG Framework

  category: Software

  image: /assets/images/projects/tag.jpg

  summary: >
    AI-powered framework for playtesting tabletop games using autonomous agents
    and simulation.

  problem: >
    Tabletop games are difficult to analyse at scale because physical playtests
    are slow, expensive and difficult to reproduce.

  solution: >
    Designed and implemented a modular Java framework supporting simulation,
    AI agents, game state representation and automated analytics.

